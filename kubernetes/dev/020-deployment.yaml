apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -f waifuland.yml convert
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: waifuland-dev
  name: waifuland-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: waifuland-dev
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -f waifuland.yml convert
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: waifuland-dev
    spec:
      containers:
        - env:
            - name: CLOUDINARY_URL
              valueFrom:
                secretKeyRef:
                  key: CLOUDINARY_URL
                  name: waifuland-secrets-dev
            - name: CLOUD_API_KEY
              valueFrom:
                secretKeyRef:
                  key: CLOUD_API_KEY
                  name: waifuland-secrets-dev
            - name: CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  key: CLOUD_NAME
                  name: waifuland-secrets-dev
            - name: CLOUD_SECRET
              valueFrom:
                secretKeyRef:
                  key: CLOUD_SECRET
                  name: waifuland-secrets-dev
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  key: DB_HOST
                  name: waifuland-secrets-dev
            - name: ROLLBAR_ENVIRONMENT
              valueFrom:
                secretKeyRef:
                  key: ROLLBAR_ENVIRONMENT
                  name: waifuland-secrets-dev
            - name: ROLLBAR_TOKEN
              valueFrom:
                secretKeyRef:
                  key: ROLLBAR_TOKEN
                  name: waifuland-secrets-dev
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  key: TOKEN
                  name: waifuland-secrets-dev
          image: dyallo/waifuland_api:X64_latest
          resources:
            limits:
              cpu: 0.25
              memory: 256Mi
            requests:
              cpu: 0.25
              memory: 256Mi
              ephemeral-storage: '1Gi'
          name: waifuland-dev
          ports:
            - containerPort: 4000
              protocol: TCP
      restartPolicy: Always
      automountServiceAccountToken: false
